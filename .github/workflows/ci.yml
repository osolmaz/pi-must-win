name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run mutate
      - run: npx --no-install slophammer-ts check . --execute
      - run: npm pack --dry-run
